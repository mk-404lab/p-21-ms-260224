spring:
  application:
    name: sbb

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        highlight_sql: true
        show_sql: true
    hibernate:
      ddl-auto: update

  thymeleaf:
    cache: false
    prefix: file:src/main/resources/templates/

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:~/local
    driver-class-name: org.h2.Driver
    username: sa
    password:

